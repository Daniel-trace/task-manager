<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Task</title>
</head>
<body>
<h1>Create Task</h1>
<form th:action="@{/tasks}" th:object="${task}" method="post">
    Title: <input type="text" th:field="*{title}"/><br/>
    Description: <textarea th:field="*{description}"></textarea><br/>
    Due Date: <input type="date" th:field="*{dueDate}"/><br/>

    Priority:
    <select th:field="*{priority}">
        <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
    </select><br/>

    Status:
    <select th:field="*{status}">
        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
    </select><br/>

    <button type="submit">Save</button>
</form>
</body>
</html>
